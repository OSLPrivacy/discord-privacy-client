async function renderPasswords() {
  const pane = getPane();
  pane.innerHTML = "";
  const h1 = document.createElement("h1");
  h1.className = "osl-h1";
  h1.textContent = "Passwords";
  pane.appendChild(h1);
  const loading = document.createElement("div");
  loading.className = "osl-hint";
  loading.textContent = "Loading…";
  pane.appendChild(loading);
  const status = await oslInvoke("osl_password_status", {});
  if (currentPage !== "passwords") return;
  loading.remove();
  if (!status.ok) {
    const err = document.createElement("div");
    err.className = "osl-empty";
    err.textContent = "Could not load password status: " + status.error;
    pane.appendChild(err);
    return;
  }
  const isSet = !!status.value.is_set;

  // ---- Main Password section ----
  const mh = document.createElement("h2");
  mh.className = "osl-h2";
  mh.textContent = "Main Password";
  pane.appendChild(mh);
  const statusP = document.createElement("p");
  statusP.style.margin = "0 0 12px 0";
  statusP.style.fontSize = "13px";
  statusP.textContent = isSet
    ? "Password is set. Required at boot."
    : "No password set. OSL boots without a password gate.";
  pane.appendChild(statusP);
  const btnRow = document.createElement("div");
  btnRow.style.display = "flex";
  btnRow.style.gap = "8px";
  const setBtn = document.createElement("button");
  setBtn.className = "osl-row-btn osl-row-btn-remove";
  setBtn.style.padding = "8px 16px";
  setBtn.textContent = isSet ? "Change Password" : "Set Password";
  setBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (isSet) onChangePassword();
    else onSetPassword();
  });
  btnRow.appendChild(setBtn);
  if (isSet) {
    const rm = document.createElement("button");
    rm.className = "osl-row-btn osl-row-btn-burn";
    rm.style.padding = "8px 16px";
    rm.textContent = "Remove Password";
    rm.addEventListener("click", (e) => { e.stopPropagation(); onRemovePassword(); });
    btnRow.appendChild(rm);
  }
  pane.appendChild(btnRow);

  // ---- Recovery Phrase section ----
  const rh = document.createElement("h2");
  rh.className = "osl-h2";
  rh.textContent = "Recovery Phrase";
  pane.appendChild(rh);
  const rp = document.createElement("p");
  rp.style.margin = "0 0 12px 0";
  rp.style.fontSize = "13px";
  rp.textContent = isSet
    ? "A recovery phrase was created when you set your password. Keep it somewhere safe."
    : "Set a main password first.";
  pane.appendChild(rp);
  if (isSet) {
    const view = document.createElement("button");
    view.className = "osl-row-btn osl-row-btn-remove";
    view.style.padding = "8px 16px";
    view.textContent = "View Recovery Phrase";
    view.addEventListener("click", (e) => { e.stopPropagation(); onViewPhrase(); });
    pane.appendChild(view);
  }

  // ---- Stealth + Burn sections ----
  await appendStealthSection(pane, isSet);
  await appendBurnSection(pane, isSet);
}

async function onSetPassword() {
  const step1 = await oslPasswordWizard((host, advance, cancel) => {
    const title = document.createElement("h3");
    title.className = "osl-modal-title";
    title.textContent = "Set Main Password";
    host.appendChild(title);
    const body = document.createElement("p");
    body.className = "osl-modal-body";
    body.textContent = "Choose a 6-character password. You'll need this every time OSL starts.";
    host.appendChild(body);
    const a = pwMakeInput("New password (6 characters)");
    const b = pwMakeInput("Confirm password");
    host.appendChild(a.wrap);
    host.appendChild(b.wrap);
    const errHost = document.createElement("div");
    host.appendChild(errHost);
    const { go } = pwRowButtons(host, "Continue", () => advance({ value: a.input.value }), cancel);
    function check() {
      let err = "";
      const v = a.input.value, c = b.input.value;
      if (v.length === 6 && !pwValidAscii(v)) err = "Only standard keyboard characters allowed.";
      else if (c.length === 6 && v !== c) err = "Passwords don't match.";
      pwError(errHost, err);
      pwEnableBtn(go, v.length === 6 && c.length === 6 && v === c && pwValidAscii(v));
    }
    a.input.addEventListener("input", check);
    b.input.addEventListener("input", check);
    setTimeout(() => a.input.focus(), 0);
  });
  if (step1 === OSL_PASSWORD_CANCEL) return;
  const setResult = await oslInvoke("osl_set_main_password", { password: step1.value });
  if (!setResult.ok) { oslToast("Set password failed: " + setResult.error); return; }
  const phrase = setResult.value;
  const step2 = await oslPasswordWizard((host, advance, cancel) => {
    const title = document.createElement("h3");
    title.className = "osl-modal-title";
    title.textContent = "Your Recovery Phrase";
    host.appendChild(title);
    const body = document.createElement("p");
    body.className = "osl-modal-body";
    body.textContent = "Write these 12 words down somewhere safe. If you forget your password, this phrase is the only way back in. Anyone with this phrase can reset your password.";
    host.appendChild(body);
    host.appendChild(pwPhraseGrid(phrase));
    const copyRow = document.createElement("div");
    copyRow.style.marginTop = "8px";
    copyRow.appendChild(pwCopyButton(phrase));
    host.appendChild(copyRow);
    const ackWrap = document.createElement("label");
    ackWrap.style.display = "flex";
    ackWrap.style.alignItems = "center";
    ackWrap.style.gap = "8px";
    ackWrap.style.margin = "16px 0 0 0";
    ackWrap.style.fontSize = "13px";
    ackWrap.style.cursor = "pointer";
    const ack = document.createElement("input");
    ack.type = "checkbox";
    const ackLabel = document.createElement("span");
    ackLabel.textContent = "I have written this down";
    ackWrap.appendChild(ack);
    ackWrap.appendChild(ackLabel);
    host.appendChild(ackWrap);
    const { go } = pwRowButtons(host, "Confirm", () => advance(true), cancel);
    ack.addEventListener("change", () => pwEnableBtn(go, ack.checked));
  });
  if (step2 === OSL_PASSWORD_CANCEL) {
    oslToast("Password set. Recovery phrase NOT acknowledged — view it via Passwords → View Recovery Phrase.");
  } else {
    oslToast("Main password set. Required on next launch.");
  }
  oslEmit("osl:password_state_changed", null);
  renderPasswords();
}

async function onChangePassword() {
  const step1 = await oslPasswordWizard((host, advance, cancel) => {
    const title = document.createElement("h3");
    title.className = "osl-modal-title";
    title.textContent = "Change Main Password";
    host.appendChild(title);
    const cur = pwMakeInput("Current password");
    const a = pwMakeInput("New password (6 characters)");
    const b = pwMakeInput("Confirm new password");
    host.appendChild(cur.wrap);
    host.appendChild(a.wrap);
    host.appendChild(b.wrap);
    const errHost = document.createElement("div");
    host.appendChild(errHost);
    const { go } = pwRowButtons(host, "Continue", () => advance({ current: cur.input.value, new: a.input.value }), cancel);
    function check() {
      let err = "";
      if (a.input.value.length === 6 && !pwValidAscii(a.input.value)) err = "Only standard keyboard characters allowed.";
      else if (b.input.value.length === 6 && a.input.value !== b.input.value) err = "New passwords don't match.";
      pwError(errHost, err);
      pwEnableBtn(go,
        cur.input.value.length === 6 && a.input.value.length === 6 && b.input.value.length === 6 &&
        a.input.value === b.input.value && pwValidAscii(a.input.value));
    }
    cur.input.addEventListener("input", check);
    a.input.addEventListener("input", check);
    b.input.addEventListener("input", check);
    setTimeout(() => cur.input.focus(), 0);
  });
  if (step1 === OSL_PASSWORD_CANCEL) return;
  const result = await oslInvoke("osl_change_main_password", { current: step1.current, new: step1.new });
  if (!result.ok) { oslToast("Change failed: " + result.error); return; }
  const phrase = result.value;
  await oslPasswordWizard((host, advance, cancel) => {
    const title = document.createElement("h3");
    title.className = "osl-modal-title";
    title.textContent = "New Recovery Phrase";
    host.appendChild(title);
    const body = document.createElement("p");
    body.className = "osl-modal-body";
    body.textContent = "Changing the password rotates your recovery phrase. Write down the new phrase — the old one no longer works.";
    host.appendChild(body);
    host.appendChild(pwPhraseGrid(phrase));
    const ackWrap = document.createElement("label");
    ackWrap.style.display = "flex";
    ackWrap.style.alignItems = "center";
    ackWrap.style.gap = "8px";
    ackWrap.style.margin = "16px 0 0 0";
    ackWrap.style.fontSize = "13px";
    ackWrap.style.cursor = "pointer";
    const ack = document.createElement("input");
    ack.type = "checkbox";
    const ackLabel = document.createElement("span");
    ackLabel.textContent = "I have written this down";
    ackWrap.appendChild(ack);
    ackWrap.appendChild(ackLabel);
    host.appendChild(ackWrap);
    const { go } = pwRowButtons(host, "Confirm", () => advance(true), cancel);
    ack.addEventListener("change", () => pwEnableBtn(go, ack.checked));
  });
  oslToast("Password changed.");
  oslEmit("osl:password_state_changed", null);
  renderPasswords();
}

async function setSecondaryPassword(opts) {
  const step = await oslPasswordWizard((host, advance, cancel) => {
    const title = document.createElement("h3");
    title.className = "osl-modal-title";
    title.textContent = (opts.isChange ? "Change " : "Set ") + opts.label;
    host.appendChild(title);
    if (opts.danger) {
      const warn = document.createElement("p");
      warn.className = "osl-modal-body";
      warn.style.color = "var(--osl-danger)";
      warn.textContent =
        "Reminder: this password DESTROYS all OSL data when entered at the boot gate. " +
        "Choose something memorable but distinct from your main and stealth passwords.";
      host.appendChild(warn);
    }
    const main = pwMakeInput("Current main password");
    const a = pwMakeInput("New " + opts.kind + " password (6 chars)");
    const b = pwMakeInput("Confirm new " + opts.kind + " password");
    host.appendChild(main.wrap);
    host.appendChild(a.wrap);
    host.appendChild(b.wrap);
    const errHost = document.createElement("div");
    host.appendChild(errHost);
    const { go } = pwRowButtons(host, opts.isChange ? "Change" : "Set",
      () => advance({ current_main: main.input.value, new: a.input.value }), cancel);
    if (opts.danger) go.style.background = "var(--osl-danger)";
    function check() {
      let err = "";
      if (a.input.value.length === 6 && !pwValidAscii(a.input.value)) err = "Only standard keyboard characters allowed.";
      else if (b.input.value.length === 6 && a.input.value !== b.input.value) err = "Passwords don't match.";
      else if (a.input.value.length === 6 && main.input.value.length === 6 && a.input.value === main.input.value)
        err = opts.label + " must differ from your main password.";
      pwError(errHost, err);
      pwEnableBtn(go,
        main.input.value.length === 6 && a.input.value.length === 6 && b.input.value.length === 6 &&
        a.input.value === b.input.value && a.input.value !== main.input.value && pwValidAscii(a.input.value));
    }
    main.input.addEventListener("input", check);
    a.input.addEventListener("input", check);
    b.input.addEventListener("input", check);
    setTimeout(() => main.input.focus(), 0);
  });
  if (step === OSL_PASSWORD_CANCEL) return;
  const args = { currentMain: step.current_main };
  if (opts.kind === "stealth") args.newStealth = step.new;
  else args.newBurn = step.new;
  const result = await oslInvoke(opts.setCommand, args);
  if (!result.ok) { oslToast(opts.label + " set failed: " + result.error); return; }
  oslToast(opts.label + " " + (opts.isChange ? "changed" : "set") + ".");
  oslEmit("osl:password_state_changed", null);
  renderPasswords();
}

async function onRemoveStealthPassword() {
  return removeSecondaryPassword({ label: "Stealth Password", command: "osl_remove_stealth_password" });
}
async function onRemoveBurnPassword() {
  return removeSecondaryPassword({ label: "Burn Password", command: "osl_remove_burn_password" });
}

async function removeSecondaryPassword(opts) {
  const step = await oslPasswordWizard((host, advance, cancel) => {
    const title = document.createElement("h3");
    title.className = "osl-modal-title";
    title.textContent = "Remove " + opts.label;
    host.appendChild(title);
    const main = pwMakeInput("Confirm with current main password");
    host.appendChild(main.wrap);
    const { go } = pwRowButtons(host, "Remove", () => advance({ current_main: main.input.value }), cancel);
    go.style.background = "var(--osl-danger)";
    main.input.addEventListener("input", () => pwEnableBtn(go, main.input.value.length === 6));
    setTimeout(() => main.input.focus(), 0);
  });
  if (step === OSL_PASSWORD_CANCEL) return;
  const result = await oslInvoke(opts.command, { currentMain: step.current_main });
  if (!result.ok) { oslToast(opts.label + " remove failed: " + result.error); return; }
  oslToast(opts.label + " removed.");
  oslEmit("osl:password_state_changed", null);
  renderPasswords();
}

// ============================================================
// 9-D: tour spotlight for slides 6-7 inside the settings window.
//
// Mirrors the main-window spotlight contract from boot.js but lives
// here because the cross-window split keeps the Bulk Whitelist /
// Server Defaults buttons settings-local. On enter we navigate to
// the Whitelist Manager page so the spotlight target exists.
// ============================================================
const OSL_SETTINGS_TOUR_SLIDES = {
  6: {
    title: "Whitelist people in bulk",
    body:
      "Encryption only works with people you've whitelisted. Use this button to whitelist your friends, paste a list of Discord IDs, or whitelist everyone in a server.\n\nYou can always whitelist individual people via their profile menu.",
    buttonLabel: "Next →",
    targetSelector: "[data-osl-bulk-whitelist-btn]",
  },
  7: {
    title: "Encrypt entire servers",
    body:
      "Turn on Server Defaults for any server, and every new channel in that server will be encrypted by default.\n\nExisting channels can be encrypted retroactively with one click.",
    buttonLabel: "Next →",
    targetSelector: "[data-osl-server-defaults-btn]",
  },
};

function oslSettingsTourWaitFor(selector, timeoutMs) {
  const deadline = Date.now() + (timeoutMs || 10000);
  return new Promise(function (resolve) {
    function tick() {
      const el = document.querySelector(selector);
      if (el) { resolve(el); return; }
      if (Date.now() > deadline) { resolve(null); return; }
      setTimeout(tick, 150);
    }
    tick();
  });
}

function oslSettingsSpotlight(opts) {
  opts = opts || {};
  const overlay = document.createElement("div");
  overlay.setAttribute("data-osl-modal", "1");
  overlay.setAttribute("data-osl-tour", "1");
  overlay.style.cssText =
    "position:fixed;inset:0;z-index:99999;pointer-events:auto;";
  const svgNs = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNs, "svg");
  svg.setAttribute("width", "100%");
  svg.setAttribute("height", "100%");
  svg.style.cssText = "position:absolute;inset:0;";
  const defs = document.createElementNS(svgNs, "defs");
  const mask = document.createElementNS(svgNs, "mask");
  const maskId = "osl_st_mask_" + Math.floor(Math.random() * 1e9);
  mask.setAttribute("id", maskId);
  const mBg = document.createElementNS(svgNs, "rect");
  mBg.setAttribute("width", "100%"); mBg.setAttribute("height", "100%"); mBg.setAttribute("fill", "white");
  mask.appendChild(mBg);
  const cutout = document.createElementNS(svgNs, "rect");
  cutout.setAttribute("fill", "black"); cutout.setAttribute("rx", "6"); cutout.setAttribute("ry", "6");
  mask.appendChild(cutout);
  defs.appendChild(mask); svg.appendChild(defs);
  const dim = document.createElementNS(svgNs, "rect");
  dim.setAttribute("width", "100%"); dim.setAttribute("height", "100%");
  dim.setAttribute("fill", "rgba(0,0,0,0.65)"); dim.setAttribute("mask", "url(#" + maskId + ")");
  svg.appendChild(dim);
  overlay.appendChild(svg);

  const card = document.createElement("div");
  card.style.cssText =
    "position:absolute;background:var(--background-floating,#18191c);color:var(--text-normal,#dbdee1);" +
    "padding:20px 22px;border-radius:10px;box-shadow:0 12px 28px rgba(0,0,0,0.55);" +
    "max-width:420px;min-width:320px;font-size:14px;line-height:1.55;";
  const skipLink = document.createElement("button");
  skipLink.textContent = "Skip tour";
  skipLink.style.cssText =
    "position:absolute;top:10px;right:12px;background:transparent;border:none;" +
    "color:var(--text-muted,#949ba4);font-size:12px;cursor:pointer;padding:2px 4px;";
  skipLink.addEventListener("click", (e) => { e.stopPropagation(); doSkip(); });
  card.appendChild(skipLink);
  const titleEl = document.createElement("h3");
  titleEl.style.cssText = "margin:0 0 10px 0;font-size:18px;font-weight:600;padding-right:60px;";
  titleEl.textContent = opts.title || "";
  card.appendChild(titleEl);
  const bodyEl = document.createElement("div");
  bodyEl.style.cssText = "white-space:pre-line;margin-bottom:16px;";
  bodyEl.textContent = opts.body || "";
  card.appendChild(bodyEl);
  const btn = document.createElement("button");
  btn.textContent = opts.buttonLabel || "Next →";
  btn.style.cssText =
    "padding:8px 16px;border-radius:5px;font-size:14px;font-weight:500;cursor:pointer;" +
    "border:none;background:var(--brand-experiment,#5865f2);color:white;float:right;";
  btn.addEventListener("click", (e) => { e.stopPropagation(); doAdvance(); });
  const row = document.createElement("div");
  row.style.cssText = "display:flex;justify-content:flex-end;";
  row.appendChild(btn);
  card.appendChild(row);
  overlay.appendChild(card);

  function positionCard() {
    const t = opts.target;
    if (!t || !document.body.contains(t)) {
      cutout.setAttribute("x", "-100"); cutout.setAttribute("y", "-100");
      cutout.setAttribute("width", "0"); cutout.setAttribute("height", "0");
      card.style.top = "50%"; card.style.left = "50%"; card.style.transform = "translate(-50%,-50%)";
      return;
    }
    const r = t.getBoundingClientRect();
    const pad = 8;
    cutout.setAttribute("x", String(Math.max(0, r.left - pad)));
    cutout.setAttribute("y", String(Math.max(0, r.top - pad)));
    cutout.setAttribute("width", String(r.width + 2 * pad));
    cutout.setAttribute("height", String(r.height + 2 * pad));
    card.style.transform = "none";
    const vh = window.innerHeight, vw = window.innerWidth, cH = 220, cW = 360;
    let top = r.top > vh / 2 ? Math.max(20, r.top - cH - 20) : Math.min(vh - cH - 20, r.bottom + 20);
    let left = Math.max(20, Math.min(vw - cW - 20, r.left + r.width / 2 - cW / 2));
    card.style.top = top + "px"; card.style.left = left + "px";
  }
  positionCard();
  function onResize() { positionCard(); }
  window.addEventListener("resize", onResize);
  function onKey(e) {
    if (e.key === "Enter" || e.key === "ArrowRight") {
      e.preventDefault(); e.stopPropagation(); doAdvance();
    } else if (e.key === "Escape") {
      e.preventDefault(); e.stopPropagation(); doSkip();
    }
  }
  window.addEventListener("keydown", onKey, true);
  function close() {
    window.removeEventListener("resize", onResize);
    window.removeEventListener("keydown", onKey, true);
    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
  }
  function doAdvance() { close(); if (typeof opts.onAdvance === "function") opts.onAdvance(); }
  function doSkip() { close(); if (typeof opts.onSkip === "function") opts.onSkip(); }
  document.body.appendChild(overlay);
  setTimeout(() => { try { btn.focus(); } catch (_) {} }, 30);
  return { el: overlay, close };
}

let oslSettingsCurrentSpotlight = null;
function oslSettingsCloseSpotlight() {
  if (oslSettingsCurrentSpotlight) {
    try { oslSettingsCurrentSpotlight.close(); } catch (_) {}
    oslSettingsCurrentSpotlight = null;
  }
}

async function oslSettingsRenderTourSlide(n) {
  oslSettingsCloseSpotlight();
  const slide = OSL_SETTINGS_TOUR_SLIDES[n];
  if (!slide) return;
  if (currentPage !== "whitelist") {
    switchPage("whitelist");
  }
  // Persist resume cursor.
  oslInvoke("osl_tour_advance", { slide: n }).catch(() => {});
  const target = await oslSettingsTourWaitFor(slide.targetSelector, 10000);
  if (!target) {
    console.warn("[OSL settings] tour: target missing for slide " + n);
    if (n < 7) {
      oslSettingsRenderTourSlide(n + 1);
    } else {
      handleSettingsAdvance(n);
    }
    return;
  }
  oslSettingsCurrentSpotlight = oslSettingsSpotlight({
    title: slide.title,
    body: slide.body,
    buttonLabel: slide.buttonLabel,
    target: target,
    onAdvance: () => handleSettingsAdvance(n),
    onSkip: async () => {
      await oslInvoke("osl_tour_skip", {}).catch(() => {});
      await oslEmit("osl:tour_return_to_main", null);
      try {
        await oslInvoke("osl_close_settings_window_if_open", {}).catch(() => {});
      } catch (_) {}
    },
  });
}

async function handleSettingsAdvance(n) {
  if (n === 6) {
    oslSettingsRenderTourSlide(7);
    return;
  }
  if (n === 7) {
    // Done in settings — hand back to main.
    oslSettingsCloseSpotlight();
    await oslInvoke("osl_tour_advance", { slide: 8 }).catch(() => {});
    await oslEmit("osl:tour_return_to_main", null);
    setTimeout(() => {
      oslInvoke("osl_close_settings_window_if_open", {}).catch(() => {});
    }, 50);
  }
}

async function oslSettingsBootTourIfActive() {
  const state = await oslInvoke("osl_tour_get_state", {});
  if (!state.ok || !state.value) return;
  if (state.value.completed) return;
  const slide = state.value.last_slide;
  if (slide === 6 || slide === 7) {
    oslSettingsRenderTourSlide(slide);
  }
}

function oslSettingsWireTourEvents() {
  try {
    if (window.__TAURI__ && window.__TAURI__.event && typeof window.__TAURI__.event.listen === "function") {
      window.__TAURI__.event.listen("osl:tour_advance_to_slide", (e) => {
        const payload = e && e.payload;
        const slide = payload && typeof payload.slide === "number" ? payload.slide : null;
        if (slide === 6 || slide === 7) {
          oslSettingsRenderTourSlide(slide);
        }
      });
    }
  } catch (e) {
    console.warn("[OSL settings] tour listener wire failed:", e);
  }
}

// ============================================================
// Boot.
// ============================================================
buildSidebar();
switchPage("identity");
oslSettingsWireTourEvents();
oslSettingsBootTourIfActive();

// G3.3 T-G3.3.5: the startup background check (Rust, ~8s post-launch)
// emits osl:update-available app-wide on a hit. If the settings
// window is open when it fires, badge the Updates sidebar item —
// passive, no modal. Opening the Updates page clears it.
oslListen("osl:update-available", () => {
  if (currentPage !== "updates") setUpdatesBadge(true);
});
</script>
