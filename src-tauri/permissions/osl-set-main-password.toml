"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 7d-B1: initial main-password setup. Generates the BIP39
# recovery phrase, writes password_marker.json. Requires no
# existing marker — change/remove flows use their own commands.
[[permission]]
identifier = "allow-osl-set-main-password"
description = "Permits trusted local UI surfaces to invoke `osl_set_main_password` (initial password setup, generates and returns recovery phrase). Phase 7d-B1."
commands.allow = ["osl_set_main_password"]
