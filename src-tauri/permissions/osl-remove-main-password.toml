"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 7d-B1: remove the password gate (delete marker file).
[[permission]]
identifier = "allow-osl-remove-main-password"
description = "Permits trusted local UI surfaces to invoke `osl_remove_main_password` (verify current password, delete password_marker.json — subsequent boots skip the password gate). Phase 7d-B1."
commands.allow = ["osl_remove_main_password"]
