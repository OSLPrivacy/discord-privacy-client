"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 7c: invitation banner data source.
[[permission]]
identifier = "allow-osl-list-pending-invitations"
description = "Permits the discord.com main webview to invoke `osl_list_pending_invitations` (return the pending_invitations queue as an array of DTOs). Used by the persistent banner system. Phase 7c."
commands.allow = ["osl_list_pending_invitations"]
