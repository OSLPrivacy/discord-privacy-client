"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 9-C2: settings-window read of the cached guild list.
[[permission]]
identifier = "allow-osl-get-guild-list"
description = "Permits the trusted local settings window to invoke `osl_get_guild_list` (read the cached guild snapshot pushed from the gateway tap). Used by the Bulk Whitelist modal's Server-picker dropdown."
commands.allow = ["osl_get_guild_list"]
