"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 3 per-conversation TTL. Writes the scoped value (after clamping
# to [1h, 7d]) to `scope_ttl.json`. Side effects: atomic file rewrite
# of the TTL preferences file in the OSL config dir.
[[permission]]
identifier = "allow-osl-set-scope-ttl"
description = "Permits the discord.com main webview to invoke `osl_set_scope_ttl` (persist a per-scope cipher-store TTL; clamped to [3600, 604800] seconds)."
commands.allow = ["osl_set_scope_ttl"]
