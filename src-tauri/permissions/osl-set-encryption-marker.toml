"$schema" = "../gen/schemas/desktop-schema.json"

# Persist the user's customised encryption-marker text to
# app_preferences.json. Any string is allowed including empty
# (renders cipher rows blank).
[[permission]]
identifier = "allow-osl-set-encryption-marker"
description = "Permits the trusted local settings window to invoke `osl_set_encryption_marker` (persist the user-customised encryption-marker text). Used by the Display settings page."
commands.allow = ["osl_set_encryption_marker"]
