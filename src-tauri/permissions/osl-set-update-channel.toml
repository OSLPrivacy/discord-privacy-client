"$schema" = "../gen/schemas/desktop-schema.json"

# G3.3: persist the update channel (stable/beta) to
# app_preferences.json. Channel is a UX affordance, not a security
# boundary — this command intentionally does not verify paid status.
[[permission]]
identifier = "allow-osl-set-update-channel"
description = "Permits the trusted local settings window to invoke `osl_set_update_channel` (persist the updater channel). Used by the Updates page channel selector."
commands.allow = ["osl_set_update_channel"]
