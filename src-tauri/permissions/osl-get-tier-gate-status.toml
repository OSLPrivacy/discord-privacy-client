"$schema" = "../gen/schemas/desktop-schema.json"

# F3.1: read the in-memory tier-gate snapshot (paid? free-window
# active? free-window-end?). Cheap — three mutex locks + a couple
# of comparisons. Granted in BOTH `main-capability` (so boot.js
# can drive the encrypt gate + nag toast off it) AND
# `settings-window-capability` (so the Account page renders the
# countdown alongside the license state). Read-only.
[[permission]]
identifier = "allow-osl-get-tier-gate-status"
description = "Permits the main Discord webview AND the local settings window to invoke `osl_get_tier_gate_status`, which returns the TierGateStatusDto driving F3's encrypt-path gate, nag toast, and Account-page countdown."
commands.allow = ["osl_get_tier_gate_status"]
