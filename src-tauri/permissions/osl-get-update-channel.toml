"$schema" = "../gen/schemas/desktop-schema.json"

# G3.3: read the persisted update channel (stable/beta) from
# app_preferences.json.
[[permission]]
identifier = "allow-osl-get-update-channel"
description = "Permits the trusted local settings window to invoke `osl_get_update_channel` (read the persisted updater channel). Drives the Updates page channel selector's initial state."
commands.allow = ["osl_get_update_channel"]
