"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 6.4: post a control wire (SKDM bundle, burn marker,
# SKDM_REQUEST, recovery SKDM) to the keyserver inbox for a single
# recipient. Replaces the Discord-channel cover delivery for non-
# content control wires — the bytes never touch Discord.
[[permission]]
identifier = "allow-osl-control-inbox-post"
description = "Permits boot.js to hand off a control wire to the keyserver inbox for the given recipient + scope, instead of posting it as a Discord-channel cover. Used by SKDM rotation, burn marker fan-out, SKDM_REQUEST, and recovery SKDM delivery."
commands.allow = ["osl_control_inbox_post"]
