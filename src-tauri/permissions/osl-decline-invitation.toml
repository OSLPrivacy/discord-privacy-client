"$schema" = "../gen/schemas/desktop-schema.json"

# Permission for Phase 7b invitation decline.
[[permission]]
identifier = "allow-osl-decline-invitation"
description = "Permits the discord.com main webview to invoke `osl_decline_invitation` (mark a pending whitelist invitation as declined; future v=2 content from that sender + scope stays as cover). Phase 7b — see §7.4."
commands.allow = ["osl_decline_invitation"]
