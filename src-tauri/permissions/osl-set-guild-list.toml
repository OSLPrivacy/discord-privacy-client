"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 9-C2: gateway tap pushes guild metadata + member-id subset to Rust.
[[permission]]
identifier = "allow-osl-set-guild-list"
description = "Permits the discord.com main webview to invoke `osl_set_guild_list` (push the user's guild snapshot — id, name, gateway-loaded member-ids subset — into ephemeral Rust state for the settings-window Bulk Whitelist modal's Server action)."
commands.allow = ["osl_set_guild_list"]
