"$schema" = "../gen/schemas/desktop-schema.json"

# Permission file for the legacy Layer 10 IPC encryption command.
# Tauri 2's permission system requires explicit declarations for
# app-level commands (auto-generation is plugin-side only). This
# file declares the `allow-osl-encrypt-message` permission and which
# command it grants. The capability `main-capability` (in
# capabilities/main.json) references this permission to grant the
# discord.com remote URL access to the command.

[[permission]]
identifier = "allow-osl-encrypt-message"
description = "Permits the discord.com main webview to invoke `osl_encrypt_message` (the legacy bridge between Discord's chat-input source-rewrite and the Rust crypto pipeline)."
commands.allow = ["osl_encrypt_message"]
