"$schema" = "../gen/schemas/desktop-schema.json"

# Permission for Phase 7b invitation accept.
[[permission]]
identifier = "allow-osl-accept-invitation"
description = "Permits the discord.com main webview to invoke `osl_accept_invitation` (mark a pending whitelist invitation as accepted; future v=2 content from that sender + scope will decrypt). Phase 7b — see §7.3."
commands.allow = ["osl_accept_invitation"]
