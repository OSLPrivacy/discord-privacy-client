"$schema" = "../gen/schemas/desktop-schema.json"

# Permission for Phase 7b set-whitelist operation.
[[permission]]
identifier = "allow-osl-set-whitelist"
description = "Permits the discord.com main webview to invoke `osl_set_whitelist` (add a whitelist entry for a peer + scope and produce the invitation wire to send). Phase 7b — see §§2.3, 7.1."
commands.allow = ["osl_set_whitelist"]
