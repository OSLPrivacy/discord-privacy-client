"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 7d-B1: boot-gate password verification.
[[permission]]
identifier = "allow-osl-verify-main-password"
description = "Permits the password_gate origin (and main webview, for re-prompts) to invoke `osl_verify_main_password` (constant-time argon2id compare; applies rate-limited lockout on failure). Phase 7d-B1."
commands.allow = ["osl_verify_main_password"]
