"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 7d-B1: consume the recovery token, set a new password.
[[permission]]
identifier = "allow-osl-set-main-password-after-recovery"
description = "Permits the password_gate origin to invoke `osl_set_main_password_after_recovery` (consume one-time recovery token from prior verify_recovery_phrase, write new marker reusing the same recovery phrase). Phase 7d-B1."
commands.allow = ["osl_set_main_password_after_recovery"]
