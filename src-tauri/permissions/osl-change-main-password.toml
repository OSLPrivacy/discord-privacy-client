"$schema" = "../gen/schemas/desktop-schema.json"

# Phase 7d-B1: rotate existing password. Generates a fresh phrase.
[[permission]]
identifier = "allow-osl-change-main-password"
description = "Permits the discord.com main webview to invoke `osl_change_main_password` (verify current, rotate to new password and new recovery phrase). Phase 7d-B1."
commands.allow = ["osl_change_main_password"]
