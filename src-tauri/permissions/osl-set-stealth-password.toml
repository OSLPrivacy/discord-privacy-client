# Phase 7d-B2: set/rotate stealth password (verifies main first).
[[permission]]
identifier = "allow-osl-set-stealth-password"
description = "Permits the discord.com main webview to invoke `osl_set_stealth_password` (verify main, write stealth_password_hash to marker). Uniqueness check against main + burn. Phase 7d-B2."
