name: Rust Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          # Keep CI aligned with Cargo.toml's workspace rust-version.
          toolchain: '1.88.0'
          components: rustfmt, clippy
      # 9-TD1: rust-cache keeps cold-cache 5-7 min runs from blowing
      # out PR feedback latency once Phase F adds new crates.
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # The app is intentionally an isolated Cargo workspace, so root
      # --workspace checks do not cover it. Keep its core and Windows-only
      # restart lifecycle on the ordinary PR path as well as release CI.
      - name: Test OSL Privacy core
        run: cargo test --manifest-path apps/osl-hub/Cargo.toml --features core --lib
      - name: Test OSL Privacy Windows identity lifecycle
        run: cargo test --manifest-path apps/osl-hub/Cargo.toml --features core --test windows_identity_lifecycle

  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      # boot.js is parsed by WebView2 (V8) at runtime; a syntax error
      # there is a hard crash for every OSL user with no fast feedback
      # short of a manual launch. `node --check` reproduces that
      # parse step in ~50ms per file.
      - name: boot.js parses
        run: node --check src-tauri/src/injection/boot.js
      # 9-TD1.2: every #[tauri::command] needs all 5 artifacts. A
      # missing TOML or capability grant makes the command silently
      # unreachable from JS — we lost debug days to that pre-9-C1.
      - name: Capability audit
        run: python3 scripts/audit_capabilities.py
