name: Reproducible Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        run: [1, 2]   # build twice; compare hashes
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: '1.88.0'
      - name: Build deterministic
        run: cargo build --profile release-deterministic
      - name: Hash artifact
        shell: pwsh
        run: |
          Get-FileHash target\release-deterministic\discord-privacy-client.exe -Algorithm SHA256 | Out-File hash-${{ matrix.run }}.txt
      - name: Upload hash
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hash-${{ matrix.run }}
          path: hash-${{ matrix.run }}.txt

  compare:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      - name: Compare hashes
        run: diff hash-1/hash-1.txt hash-2/hash-2.txt
